assemble:
    - from: vite-build
      into: static

# This is the import map entry so you can import the custom element in a custom fragment
__APP_NAME__:
    bareSpecifier: __APP_NAME__
    name: __APP_NAME__
    type: jsImportMapsEntry
    url: assets/index.js

# This is the custom element definition
__APP_NAME__-element:
    friendlyURLMapping: __APP_NAME__
    htmlElementName: __APP_NAME__
    instanceable: false
    name: __APP_NAME__
    portletCategoryName: category.client-extensions
    type: customElement
    urls:
        - assets/*.js
    useESM: true
    liferay.virtual.instance.id: default
